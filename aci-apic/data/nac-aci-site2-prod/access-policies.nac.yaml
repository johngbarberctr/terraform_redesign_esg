    physical_domains:
#       - name: phys-vmm-domain
#         vlan_pool: vmm-vlan-pool

      - name: phys-fi-domain
        vlan_pool: fi-static-vlan-pool

    # netascode/nac-aci 0.7.0 reads CDP/LLDP/Port-Channel/Link-Level policies
    # from access_policies.interface_policies.* -- not directly under
    # access_policies. The module has no lacp_policies key (lacpLagPol is
    # created from port_channel_policies, and PGs reference it via
    # port_channel_policy:).
    interface_policies:
      cdp_policies:
        - name: cdp-enabled
          admin_state: true

      lldp_policies:
        - name: lldp-enabled
          admin_rx_state: true
          admin_tx_state: true

      port_channel_policies:
        - name: mac-pinning
          mode: mac-pin

      link_level_policies:
        - name: 10G
          speed: "10G"
          auto: true

    aaeps:
#       - name: vmm-aaep
#         infra_vlan: true
#         vmware_vmm_domains:
#           # APCK-VDS1: existing per-fabric VDS in shared vCenter (Option A).
#           - APCK-VDS1
#         physical_domains:
#           - phys-vmm-domain

      - name: fi-aaep
        infra_vlan: true
        # vmware_vmm_domains: [APCK-VDS1]  # commented out — VMM already configured in APIC
        physical_domains:
          - phys-fi-domain

    leaf_interface_policy_groups:
#       - name: vpc-vmm-hosts
#         type: vpc
#         aaep: vmm-aaep
#         link_level_policy: 10G
#         cdp_policy: cdp-enabled
#         lldp_policy: lldp-enabled
#         port_channel_policy: mac-pinning

      - name: PC_FI_A
        type: pc
        aaep: fi-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: mac-pinning

      - name: PC_FI_B
        type: pc
        aaep: fi-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: mac-pinning

    # VMM port range trimmed from 1-48 to 8-48 to reserve eth1/6 and eth1/7
    # for the FI uplink profiles below.
    leaf_interface_profiles:
      - name: leaf-101-102-intprof
        interface_selectors:
#           - name: vmm-host-ports
#             policy_group: vpc-vmm-hosts
#             port_blocks:
#               - name: block1
#                 from_port: 8
#                 to_port: 48

      - name: leaf-101-fi-intprof
        interface_selectors:
          - name: fi-a-uplink
            policy_group: PC_FI_A
            port_blocks:
              - name: block1
                from_port: 6
                to_port: 6

      - name: leaf-102-fi-intprof
        interface_selectors:
          - name: fi-b-uplink
            policy_group: PC_FI_B
            port_blocks:
              - name: block1
                from_port: 7
                to_port: 7

    # Contiguous node range now that both leaves are 101-102.
    leaf_switch_profiles:
      - name: leaf-101-102-prof
        selectors:
          - name: leaf-101-102-sel
            node_blocks:
              - name: block1
                from: 101
                to: 102
        interface_profiles:
          - leaf-101-102-intprof

      - name: leaf-101-prof
        selectors:
          - name: leaf-101-sel
            node_blocks:
              - name: block1
                from: 101
                to: 101
        interface_profiles:
          - leaf-101-fi-intprof

      - name: leaf-102-prof
        selectors:
          - name: leaf-102-sel
            node_blocks:
              - name: block1
                from: 102
                to: 102
        interface_profiles:
          - leaf-102-fi-intprof
