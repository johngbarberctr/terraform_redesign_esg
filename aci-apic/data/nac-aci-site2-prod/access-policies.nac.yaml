    physical_domains:
#       - name: phys-vmm-domain
#         vlan_pool: vmm-vlan-pool

      - name: phys-fi-domain
        vlan_pool: fi-static-vlan-pool

      - name: PhysDom_ACI_Nexus
        vlan_pool: VLAN_All_Combined

    routed_domains:
      - name: L3_Dom_ND
        vlan_pool: VLAN_All_Combined

    # netascode/nac-aci 0.7.0 reads CDP/LLDP/Port-Channel/Link-Level policies
    # from access_policies.interface_policies.*. The module has no lacp_policies
    # key -- lacpLagPol is created from port_channel_policies, and PGs reference
    # it via port_channel_policy:.
    interface_policies:
      cdp_policies:
        - name: cdp-enabled
          admin_state: true

      lldp_policies:
        - name: lldp-enabled
          admin_rx_state: true
          admin_tx_state: true

      port_channel_policies:
        - name: mac-pinning
          mode: mac-pin

        - name: lacp-active
          mode: active

      link_level_policies:
        - name: 10G
          speed: "10G"
          auto: true

    aaeps:
#       - name: vmm-aaep
#         infra_vlan: true
#         vmware_vmm_domains:
#           # Del-Din-VDS1 is the VDS for this fabric (now active on fi-aaep below).
#           - Del-Din-VDS1
#         physical_domains:
#           - phys-vmm-domain

      # AAEP for FI uplinks. Carries BOTH the VMM domain (VDS trunk to ESXi
      # behind FIs) AND the static physical domain (non-VM workloads).
      # infra_vlan is true because ESXi VTEPs need the infra VLAN for OpFlex.
      - name: fi-aaep
        infra_vlan: true
        vmware_vmm_domains:
          - Del-Din-VDS1
        physical_domains:
          - phys-fi-domain

      # Legacy AAEP for N5K migration VPC/PC policy groups (VPC_D1A-B, etc.).
      # Matches the pre-existing production APIC object. L3_Dom_ND provides
      # the routed-domain binding used by Nexus Dashboard.
      - name: AAEP_ACI_Nexus
        physical_domains:
          - PhysDom_ACI_Nexus
        routed_domains:
          - L3_Dom_ND

    leaf_interface_policy_groups:
#       - name: vpc-vmm-hosts
#         type: vpc
#         aaep: vmm-aaep
#         link_level_policy: 10G
#         cdp_policy: cdp-enabled
#         lldp_policy: lldp-enabled
#         port_channel_policy: mac-pinning

      # Real vPCs to the UCS Fabric Interconnects (dual-homed across 101/102).
      # VPC_FI-A on eth1/6 (FI-A), VPC_FI-B on eth1/7 (FI-B).
      - name: VPC_FI-A
        type: vpc
        aaep: fi-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: lacp-active

      - name: VPC_FI-B
        type: vpc
        aaep: fi-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: lacp-active

    # Both FI uplinks live on the SAME interface profile applied to the 101/102
    # switch profile. Because the policy groups are type: vpc, applying one
    # profile to both leaves forms a vPC per FI. eth1/6 = FI-A, eth1/7 = FI-B.
    # Eth1/1-5 and 1/8-48 are held in reserve (no host ports on the leaves --
    # ESXi attaches behind the FIs, not directly to the leaves).
    leaf_interface_profiles:
      - name: leaf-101-102-intprof
        interface_selectors:
          - name: fi-a-uplink
            policy_group: VPC_FI-A
            port_blocks:
              - name: block1
                from_port: 6
                to_port: 6
          - name: fi-b-uplink
            policy_group: VPC_FI-B
            port_blocks:
              - name: block1
                from_port: 7
                to_port: 7

    # Contiguous node range now that both leaves are 101-102.
    leaf_switch_profiles:
      - name: leaf-101-102-prof
        selectors:
          - name: leaf-101-102-sel
            node_blocks:
              - name: block1
                from: 101
                to: 102
        interface_profiles:
          - leaf-101-102-intprof
