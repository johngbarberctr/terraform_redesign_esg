# Access policies for VMM host connectivity and direct UCS-FI uplinks (Site2 = Del Din, PRODUCTION).
#
# IDENTICAL in design to ../nac-aci-site2/ (the lab copy). The only prod/lab
# differences are environment values (APIC / vCenter / NDO IP addresses and the
# device usernames/passwords), which live in prod.tfvars / CI variables -- never
# in this file. Keep in sync with ../nac-aci-site2/access-policies.nac.yaml:
#   VPC_FI-A -> vPC across Leaf-101 + Leaf-102, eth1/6 (to UCS FI-A).
#   VPC_FI-B -> vPC across Leaf-101 + Leaf-102, eth1/7 (to UCS FI-B).
#   The vPC explicit protection group for 101/102 already exists in the fabric.
#
# fi-static-vlan-pool is identical to Site1 (213 VLANs, 93 contiguous ranges).
# VMM domain itself is defined in vmm-domain.nac.yaml under fabric_policies.
---
apic:
  access_policies:
    vlan_pools:
#       - name: vmm-vlan-pool
#         allocation: dynamic
#         ranges:
#           - from: 3501
#             to: 3967

      # Legacy IPv4 infrastructure pool. Matches production APIC object
      # "Pool_VLAN_All_Combined" (2024-03-08 backup). Named VLAN_All_Combined
      # to align with the ndo-terraform-ipv6 stack, which also declares this
      # pool and adds IPv6 SVI entries (3001-3083) outside these ranges.
      # Range 66-67 extended from the backup (66 only) to match fi-static-vlan-pool.
      - name: VLAN_All_Combined
        allocation: static
        ranges:
          - { from: 5,    to: 54   }
          - { from: 66,   to: 67   }
          - { from: 80,   to: 998  }
          - { from: 1000, to: 2176 }
          - { from: 2205, to: 2205 }

      # Static pool for FI-attached, non-VMM workloads. Identical to Site1 pool
      # (213 VLANs, 93 contiguous ranges).
      - name: fi-static-vlan-pool
