# Access policies for VMM host connectivity and direct UCS-FI uplinks (Site2, PROD).
#
# This directory targets the PRODUCTION fabric (Design A: UCS-FI direct attach
# without vPC). It is NOT consumed by the lab Terraform root in
# ../../apic-vmware/ -- the lab continues to read ../nac-aci-site2/, which
# describes the simulator topology.
#
# Mirrors data/nac-aci-site1-prod/access-policies.nac.yaml. Names are scoped
# per-APIC, so reusing them across fabrics is safe and intentional.
#
# Production topology after the N5K -> ACI cutover:
#   FI-A is single-homed to Leaf-101 via PC_FI_A (eth1/6).
#   FI-B is single-homed to Leaf-102 via PC_FI_B (eth1/7).
#   Same port numbers as Site1 for symmetry.
#   No vPC explicit protection group: FIs are not peered with each other.
#
# Site2 leaf nodes are 101 and 102 (contiguous). The combined VMM switch
# profile uses a single contiguous from/to range.
---
apic:
  access_policies:
    vlan_pools:
#       - name: vmm-vlan-pool
#         allocation: dynamic
#         ranges:
#           - from: 3501
#             to: 3967

