# Access policies for AFRICOM -- Site1 (Kelley), PRODUCTION: LEGACY IPv4 infrastructure ONLY.
#
# FI uplinks and the VMware VMM domain are NOT managed here. They are owned by
# the canonical africom-aci-apic/ stack (VPC_FI-A / VPC_FI-B vPCs on eth1/6-7 +
# the Kelley-VDS1 VMM domain on fi-aaep), so a single Terraform state owns those
# APIC MOs and the two stacks no longer fight over them.
#
# This file manages only the pre-existing legacy IPv4 / N5K-migration objects:
#   VLAN_All_Combined  static VLAN pool (matches APIC "Pool_VLAN_All_Combined")
#   PhysDom_ACI_Nexus  physical domain  -> VLAN_All_Combined
#   L3_Dom_ND          routed domain    -> VLAN_All_Combined
#   AAEP_ACI_Nexus     AAEP used by the N5K-migration VPC/PC groups (VPC_D1A-B, ...)
# plus the shared CDP / LLDP / port-channel / link-level interface policies those
# migration groups reference.
#
# Identical in design to nac-aci-site1-prod/ (only IPs/creds differ, via tfvars).
---
apic:
  access_policies:
    vlan_pools:
      # Legacy IPv4 infrastructure pool. Matches production APIC object
      # "Pool_VLAN_All_Combined" (2024-03-08 backup). Named VLAN_All_Combined
      # to align with the ndo-terraform-ipv6 stack, which also declares this
      # pool and adds IPv6 SVI entries (3001-3083) outside these ranges.
      - name: VLAN_All_Combined
        allocation: static
        ranges:
          - { from: 5,    to: 54   }
          - { from: 66,   to: 67   }
          - { from: 80,   to: 998  }
          - { from: 1000, to: 2176 }
          - { from: 2205, to: 2205 }

    physical_domains:
      - name: PhysDom_ACI_Nexus
        vlan_pool: VLAN_All_Combined

    routed_domains:
      - name: L3_Dom_ND
        vlan_pool: VLAN_All_Combined

    # netascode/nac-aci 0.7.0 reads CDP/LLDP/Port-Channel/Link-Level policies
    # from access_policies.interface_policies.*. Kept here for the legacy N5K
    # migration VPC/PC policy groups (VPC_D1A-B, etc.) that reference them.
    interface_policies:
      cdp_policies:
        - name: cdp-enabled
          admin_state: true

      lldp_policies:
        - name: lldp-enabled
          admin_rx_state: true
          admin_tx_state: true

      port_channel_policies:
        - name: mac-pinning
          mode: mac-pin

        - name: lacp-active
          mode: active

      link_level_policies:
        - name: 10G
          speed: "10G"
          auto: true

    aaeps:
      # Legacy AAEP for N5K migration VPC/PC policy groups (VPC_D1A-B, etc.).
      # Matches the pre-existing production APIC object. L3_Dom_ND provides
      # the routed-domain binding used by Nexus Dashboard.
      - name: AAEP_ACI_Nexus
        physical_domains:
          - PhysDom_ACI_Nexus
        routed_domains:
          - L3_Dom_ND
