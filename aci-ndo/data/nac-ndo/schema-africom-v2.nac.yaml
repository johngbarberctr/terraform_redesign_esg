# =============================================================================
# Schema AFRICOM-V2 -- single source of truth for the consolidated tenant tree.
#
# Single-template design (Cisco NDO "Approach 1: Single Template Deployment"
# from the 4.3.1 templates overview). Everything for the redesign lives in
# one template:
#
#   - 2 VRFs (VRF-AFR-DEL.Services-V2, VRF-DMZ-V2) with vzAny enforced
#   - 2 contracts (Any_VRF-AFR-DEL.Services-V2, Any_VRF-DMZ-V2), filter cross-ref to
#     AFRICOM/VRF_Template/Any (filter names are unique per tenant)
#   - 39 stretched BDs (l2_stretch=true is the default in nac-ndo)
#   - 2 ANPs (AppProf-NetCentric-V2, AppProf-DMZ-V2) with 39 EPGs total
#     (a third ANP, AppProf-AppCentric-V2, is created APIC-direct in
#     ../nac-aci-shared/tenant-eur-esgs.nac.yaml -- it holds the Phase-2
#     ESGs that overlay these EPGs; see "ESGs" note below)
#   - VMware VMM bindings on every EPG to APCG-VDS1 on Kelley and APCK-VDS1
#     on Del-Din (per-fabric VMM domains: each adopts its own pre-existing VDS
#     in the shared vCenter rather than creating a new shared VDS)
#
# Naming convention -- WHY THE -V2 SUFFIX:
#   * Every tenant-scoped object (BDs, EPGs, VRFs, contracts, ANPs) carries
#     -V2. The legacy AFRICOM schema (managed by ../../../sac-johbarbe-AFRICOM-terraform-nac-ndo)
#     deploys to the same tenant AFR-DEL.Services. ACI enforces unique object names per
#     tenant (uni/tn-AFR-DEL.Services/BD-foo is one MO; two NDO templates cannot both own
#     it), so the redesign needs distinct names to coexist with AFRICOM during
#     the parallel-run period.
#   * The suffix is GENERATIONAL, not address-family. These objects are NOT
#     "the IPv4 versions" -- they are version 2 of the tenant model and will
#     eventually carry both IPv4 and IPv6 subnets (dual-stack BDs). Do not
#     read -V2 as a synonym for -IPv4.
#   * After cutover (when AFRICOM is decommissioned) the suffix can either stay
#     (cosmetic only) or be dropped during a per-object maintenance window
#     (each rename = destroy+recreate of that one BD/EPG, so it carries a
#     brief drop on that object's traffic). Most operators just keep -V2.
#   * Filter "Any" in the contracts below is INTENTIONALLY left un-suffixed
#     -- it is referenced cross-schema from AFRICOM/VRF_Template/Any, not
#     redefined here, so there is nothing to collide.
#
# Why single template:
#   * Fully-stretched, fully-symmetric tenant -- no site-local objects.
#   * No cross-template references => no risk of NDO 4.0+ cyclical dep error.
#   * One deploy click in the NDO UI per change.
#   * One rollback unit per coherent change set.
#   * Aligns with the existing AFRICOM/VRF_Template single-template pattern.
#
# Deploy / cutover:
#   * The ndo/ Terraform root runs with deploy_templates=false. This file
#     creates the schema and template content in NDO only. Pushes to Kelley
#     and Del-Din are operator-driven from the NDO UI:
#       Application Management -> Schemas -> AFRICOM-V2
#         -> Tenant_AFR-DEL.Services_V2 -> Deploy to sites
#   * Static port bindings on the EPGs are NOT in this file. They land via
#     ../../scripts/deploy_bindings.py against the NDO REST API after the
#     template is deployed.
#
# Notes:
#   * Filter "Any" intentionally NOT defined here. Tenant AFR-DEL.Services already has
#     filter Any in schema AFRICOM / template VRF_Template (created by the
#     sac-johbarbe-AFRICOM-terraform-nac-ndo stack). NDO enforces unique object names per
#     tenant, so the two contracts below cross-reference that existing filter.
#   * L3Outs and External EPGs are NOT declared in this schema. North-south
#     routing for VRF-AFR-DEL.Services-V2 and VRF-DMZ-V2 is provided by the L3Outs that
#     already exist in the legacy IPv6 schema (managed by ../../ndo-terraform/
#     and sac-johbarbe-AFRICOM-terraform-nac-ndo). Eventually the redesign will own its own
#     L3Outs (different VRF names, different EPG-to-L3Out scoping); when that
#     work lands, add `l3outs:` and `external_epgs:` blocks here.
#   * ESGs are NOT declared in this NDO schema. The netascode/nac-ndo/mso
#     v1.2.x module schema does not model endpoint_security_groups, and the
#     upstream Cisco mso Terraform provider also lacks ESG resource types
#     (verified against v1.7.x). ESGs therefore live APIC-direct in
#     ../nac-aci-shared/tenant-eur-esgs.nac.yaml (loaded by both Kelley and
#     Del-Din modules in ../../apic-vmware/main.tf), under the third ANP
#     AppProf-AppCentric-V2. Phase 2 ships two lift-and-shift ESGs:
#       - ESG-All-Internal-V2 (VRF-AFR-DEL.Services-V2)  -> selects all 36 EPGs in
#         AppProf-NetCentric-V2 (declared below).
#       - ESG-All-DMZ-V2      (VRF-DMZ-V2)  -> selects all 3 EPGs in
#         AppProf-DMZ-V2 (declared below).
#     vzAny+permit-all on each VRF (set below) makes these ESGs reachability-
#     neutral: applying them does not change traffic. Phase 3 will start
#     splitting them into per-zone ESGs by adding tag_selectors. See
#     ../../DESIGN.md "Migration phases" and the header of
#     ../nac-aci-shared/tenant-eur-esgs.nac.yaml for the full ESG playbook.
#     If the netascode/nac-ndo/mso module ever gains ESG support, the ESG
#     content can be migrated into this schema with a Terraform state move
#     (no destroy/recreate).
#   * Static port bindings (staticPorts[] on EPGs) are NOT in this YAML.
#     nac-ndo doesn't model that field yet. They are PATCHed into NDO via
#     ../../scripts/deploy_bindings.py from a curated JSON file AFTER this
#     schema is deployed. Three EPGs (EPG-LB-V2, EPG-LMR-V2, EPG-VHOST-MGMT-V2)
#     are deliberately NOT bound to a VMM domain because their endpoints are
#     physical (F5 BIG-IP, LMR gateways, ESXi vmkernel); they require
#     static bindings to function.
#   * sites: at the template level associates the template to Kelley/Del-Din.
#     sites: under each VRF is for site-local VRF properties; with no
#     site-local overrides, listing the sites is harmless and matches the
#     style of the existing IPv6 schema.
# =============================================================================
---
ndo:
  schemas:
    - name: AFRICOM-V2
      templates:
        - name: Tenant_AFR-DEL.Services_V2
          tenant: AFR-DEL.Services
          sites:
            - Kelley
            - Del-Din

          # ─────────────────────────────────────────────────────────────────────
          # VRFs and contracts (vzAny permit-all between EPGs in the VRF)
          # ─────────────────────────────────────────────────────────────────────
          vrfs:
            - name: VRF-AFR-DEL.Services-V2
              vzany: true
              contracts:
                providers:
                  - name: Any_VRF-AFR-DEL.Services-V2
                consumers:
                  - name: Any_VRF-AFR-DEL.Services-V2
              sites:
                - name: Kelley
                - name: Del-Din

            - name: VRF-DMZ-V2
              vzany: true
              contracts:
                providers:
                  - name: Any_VRF-DMZ-V2
                consumers:
                  - name: Any_VRF-DMZ-V2
              sites:
                - name: Kelley
                - name: Del-Din

          contracts:
            - name: Any_VRF-AFR-DEL.Services-V2
              scope: context
              type: bothWay
              filters:
                - name: Any
                  schema: AFRICOM
                  template: VRF_Template

            - name: Any_VRF-DMZ-V2
              scope: context
              type: bothWay
              filters:
                - name: Any
                  schema: AFRICOM
                  template: VRF_Template

          # ─────────────────────────────────────────────────────────────────────
          # Bridge Domains (39 total: 36 in VRF-AFR-DEL.Services-V2, 3 in VRF-DMZ-V2)
          # All BDs are L2-stretched (default behaviour in nac-ndo).
          # VRF refs are in-template, so no schema/template fields needed.
