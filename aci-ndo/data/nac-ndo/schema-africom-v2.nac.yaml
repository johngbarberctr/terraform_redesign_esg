          # ─────────────────────────────────────────────────────────────────────
          application_profiles:

            # ── AppProf-NetCentric-V2 (VRF-AFR-DEL.Services-V2) -- 36 EPGs ────────────────
            # Network-centric layer: one EPG per BD per legacy VLAN/subnet
            # group. The Phase-2 ESGs in ../nac-aci-shared/tenant-eur-esgs.
            # nac.yaml (under the APIC-direct AppProf-AppCentric-V2 ANP)
            # reference these EPGs by application_profile + endpoint_group;
            # any rename here MUST be mirrored in the epg_selectors list
            # over there or the ESG selectors will silently match nothing.
            - name: AppProf-NetCentric-V2
              description: "Network-centric layer: one EPG per BD per legacy VLAN/subnet (V2 consolidated tenant model)"
              endpoint_groups:

                - name: EPG-ACAS-MGMT-V2
                  bridge_domain: { name: BD-ACAS-MGMT-V2 }
                  sites: &epg_sites_internal
                    - name: Kelley
                      vmware_vmm_domains:
                        - name: APCG-VDS1
                          deployment_immediacy: immediate
                          resolution_immediacy: immediate
                    - name: Del-Din
                      vmware_vmm_domains:
                        - name: APCK-VDS1
                          deployment_immediacy: immediate
                          resolution_immediacy: immediate

                - name: EPG-ACAS-SCANNERS-V2
                  bridge_domain: { name: BD-ACAS-SCANNERS-V2 }
                  sites: *epg_sites_internal

                - name: EPG-AD-V2
                  bridge_domain: { name: BD-AD-V2 }
                  sites: *epg_sites_internal

                - name: EPG-ADM-DCO-V2
                  bridge_domain: { name: BD-ADM-DCO-V2 }
                  sites: *epg_sites_internal

                - name: EPG-ADFS-V2
                  bridge_domain: { name: BD-ADFS-V2 }
                  sites: *epg_sites_internal

                - name: EPG-APP-SVR-V2
                  bridge_domain: { name: BD-APP-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-BACKUP-SVR-V2
                  bridge_domain: { name: BD-BACKUP-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-C2C-SCANNERS-V2
                  bridge_domain: { name: BD-C2C-SCANNERS-V2 }
                  sites: *epg_sites_internal

                - name: EPG-CFG-MGMT-V2
                  bridge_domain: { name: BD-CFG-MGMT-V2 }
                  sites: *epg_sites_internal

                - name: EPG-DB-SVR-V2
                  bridge_domain: { name: BD-DB-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-DHCP-SVR-V2
                  bridge_domain: { name: BD-DHCP-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-DNS-MGMT-V2
                  bridge_domain: { name: BD-DNS-MGMT-V2 }
                  sites: *epg_sites_internal

                - name: EPG-E911-SVR-V2
                  bridge_domain: { name: BD-E911-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-FILE-SVR-V2
                  bridge_domain: { name: BD-FILE-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-FMWR-SVR-V2
                  bridge_domain: { name: BD-FMWR-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-GEF-MGMT-V2
                  bridge_domain: { name: BD-GEF-MGMT-V2 }
                  sites: *epg_sites_internal

                - name: EPG-LB-V2
                  bridge_domain: { name: BD-LB-V2 }
                  # F5 BIG-IP is a physical appliance (vPC to F5_BIGIP in legacy
                  # N5K config). VMM domain removed -- bound statically only.
                  sites:
                    - name: Kelley
                    - name: Del-Din

                - name: EPG-LMR-V2
                  bridge_domain: { name: BD-LMR-V2 }
                  # Land Mobile Radio gateways are physical. VMM domain removed.
                  sites:
                    - name: Kelley
                    - name: Del-Din

                - name: EPG-MECM-V2
                  bridge_domain: { name: BD-MECM-V2 }
                  sites: *epg_sites_internal

                - name: EPG-NAC-V2
                  bridge_domain: { name: BD-NAC-V2 }
                  sites: *epg_sites_internal

                - name: EPG-NMS-V2
                  bridge_domain: { name: BD-NMS-V2 }
                  sites: *epg_sites_internal

                - name: EPG-OCSP-V2
                  bridge_domain: { name: BD-OCSP-V2 }
                  sites: *epg_sites_internal

                - name: EPG-PATCH-V2
                  bridge_domain: { name: BD-PATCH-V2 }
                  sites: *epg_sites_internal

                - name: EPG-PKI-SRV-V2
                  bridge_domain: { name: BD-PKI-SRV-V2 }
                  sites: *epg_sites_internal

                - name: EPG-PRINT-SVR-V2
                  bridge_domain: { name: BD-PRINT-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-RCC-DCO-V2
                  bridge_domain: { name: BD-RCC-DCO-V2 }
                  sites: *epg_sites_internal

                - name: EPG-RCC-DNS-V2
                  bridge_domain: { name: BD-RCC-DNS-V2 }
                  sites: *epg_sites_internal

                - name: EPG-RCC-SVR-V2
                  bridge_domain: { name: BD-RCC-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-RCC-UNIX-V2
                  bridge_domain: { name: BD-RCC-UNIX-V2 }
                  sites: *epg_sites_internal

                - name: EPG-SMTP-SVR-V2
                  bridge_domain: { name: BD-SMTP-SVR-V2 }
                  sites: *epg_sites_internal

                - name: EPG-SYSLOG-V2
                  bridge_domain: { name: BD-SYSLOG-V2 }
                  sites: *epg_sites_internal

                - name: EPG-SYSMAN-V2
                  bridge_domain: { name: BD-SYSMAN-V2 }
                  sites: *epg_sites_internal

                - name: EPG-VHOST-MGMT-V2
                  bridge_domain: { name: BD-VHOST-MGMT-V2 }
                  # ESXi hypervisor management (vmkernel) lives on the bare-metal
                  # hosts themselves and cannot ride a VDS port-group; VMM
                  # domain removed.
                  sites:
                    - name: Kelley
                    - name: Del-Din

                - name: EPG-VVOIP-MGMT-V2
                  bridge_domain: { name: BD-VVOIP-MGMT-V2 }
                  sites: *epg_sites_internal

                - name: EPG-VVOIP-PROXY-V2
                  bridge_domain: { name: BD-VVOIP-PROXY-V2 }
                  sites: *epg_sites_internal

                - name: EPG-WEB-SVR-V2
                  bridge_domain: { name: BD-WEB-SVR-V2 }
                  sites: *epg_sites_internal

            # ── AppProf-DMZ-V2 (VRF-DMZ-V2) -- 3 EPGs ────────────────────────
            - name: AppProf-DMZ-V2
              description: "DMZ proxy segments -- routing-isolated from internal"
              endpoint_groups:

                - name: EPG-D64-PROXY-V2
                  bridge_domain: { name: BD-D64-PROXY-V2 }
                  sites: *epg_sites_internal

                - name: EPG-FWEB-PROXY-V2
                  bridge_domain: { name: BD-FWEB-PROXY-V2 }
                  sites: *epg_sites_internal

                - name: EPG-RWEB-PROXY-V2
                  bridge_domain: { name: BD-RWEB-PROXY-V2 }
                  sites: *epg_sites_internal
