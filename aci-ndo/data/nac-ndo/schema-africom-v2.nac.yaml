          # The "From: BD-Vxxxx" comments document the legacy BDs that each
          # consolidated BD absorbs from the pre-redesign IPv6 schema. The
          # "(IPv6-only, no IPv4 predecessor)" markers note BDs that have no
          # legacy IPv4 subnet history; these will be dual-stack from day one
          # in the V2 model when IPv6 prefixes are added.
          # ─────────────────────────────────────────────────────────────────────
          bridge_domains:

            # ── BD-ACAS-MGMT-V2 (no legacy IPv4 predecessor) ─────────────────
            - name: BD-ACAS-MGMT-V2
              vrf: { name: VRF-AFR-DEL.Services-V2 }

            # ── BD-ACAS-SCANNERS-V2 ──────────────────────────────────────────
            # From: BD-V0174 (APCG_ACAS), BD-V0474 (APCK_RETINA), BD-V0099
