# aci-redesign / ndo (IPv4 REDESIGN, NDO-managed) CI
#
# Per-project pipeline for the IPv4 redesign tenant tree (schema
# AEDCE-IPv4 / template Tenant_EUR_IPv4: 2 VRFs, 39 BDs, 2 ANPs, 39 EPGs,
# 2 vzAny contracts). Reads YAML from aci-redesign/data/nac-ndo/.
#
# Pipeline shape: validate -> plan -> apply (manual)
#
# >>> After `apply` succeeds, the schema content is in NDO but NOT
# >>> deployed to AEDCG/AEDCK (deploy_templates = false). YOU MANUALLY
# >>> click in the NDO UI:
# >>>     Application Management -> Schemas -> AEDCE-IPv4 ->
# >>>     Tenant_EUR_IPv4 -> Deploy to sites -> [AEDCG, AEDCK]
#
# Phase-1 prerequisite: tenant EUR and the cross-schema-referenced filter
# `Any` under AEDCE/VRF_Template MUST already exist in NDO. They are
# created by the sibling repo ~/DC/ACI/ndo-terraform-nac-prod/ (its own
# pipeline). If you run this project's apply before Phase 1 has been
# applied AND its templates manually deployed, plan will fail to resolve
# the cross-schema reference.
#
# Trigger:
#   - Auto: any push / MR that changes aci-redesign/ndo/** or
#           aci-redesign/data/nac-ndo/**.
#   - Manual: GitLab UI -> Run pipeline -> set PROJECT=aci-redesign-ndo.
#
# Required GitLab CI/CD variables (Settings -> CI/CD -> Variables):
#   NDO_USERNAME, NDO_PASSWORD (Masked), NDO_URL
#   GITLAB_API_URL (defaults to ${CI_API_V4_URL})
#
# Note: the HTTP state backend is authenticated with the per-job
# $CI_JOB_TOKEN (see .aci-redesign-ndo-vars below). No PAT is required
# in CI variables, and there is no expiry to manage.

.aci-redesign-ndo-rules: &aci-redesign-ndo-rules
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
      - aci-redesign/ndo/**/*
      - aci-redesign/data/nac-ndo/**/*
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - aci-redesign/ndo/**/*
      - aci-redesign/data/nac-ndo/**/*
  - if: $PROJECT == "aci-redesign-ndo"

.aci-redesign-ndo-vars: &aci-redesign-ndo-vars
  TF_HTTP_ADDRESS: "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/terraform/state/aci-redesign-ndo"
  TF_HTTP_LOCK_ADDRESS: "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/terraform/state/aci-redesign-ndo/lock"
  TF_HTTP_LOCK_METHOD: POST
  TF_HTTP_UNLOCK_ADDRESS: "${GITLAB_API_URL}/projects/${CI_PROJECT_ID}/terraform/state/aci-redesign-ndo/lock"
  TF_HTTP_UNLOCK_METHOD: DELETE
  # Authenticate the HTTP state backend with the per-job CI token. No PAT
  # in CI variables, no expiry to manage. The token is auto-revoked at job
  # end and only has read/write to this project's terraform state.
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
  TF_VAR_ndo_username: "${NDO_USERNAME}"
  TF_VAR_ndo_password: "${NDO_PASSWORD}"
  TF_VAR_ndo_url: "${NDO_URL}"

validate-aci-redesign-ndo:
  extends: .tf-job
  stage: validate
  script:
    - cd aci-redesign/ndo
    - terraform fmt -check
    - terraform init -backend=false -input=false
    - terraform validate
  cache: []
  rules: *aci-redesign-ndo-rules

plan-aci-redesign-ndo:
  extends: .tf-job
  stage: plan
  resource_group: aci-redesign-ndo
  variables:
    <<: *aci-redesign-ndo-vars
  script:
    - cd aci-redesign/ndo
    - terraform init -input=false
    - terraform plan -out=plan.tfplan -input=false
    - terraform show -no-color plan.tfplan > plan.txt
    - terraform show -json    plan.tfplan | jq > plan.json
    - terraform show -json    plan.tfplan | jq '([.resource_changes[]?.change.actions?]|flatten)|{"create":(map(select(.=="create"))|length),"update":(map(select(.=="update"))|length),"delete":(map(select(.=="delete"))|length)}' > plan_gitlab.json
  artifacts:
    paths:
      - aci-redesign/ndo/plan.tfplan
      - aci-redesign/ndo/plan.txt
      - aci-redesign/ndo/plan.json
      - aci-redesign/ndo/plan_gitlab.json
    reports:
      terraform: aci-redesign/ndo/plan_gitlab.json
    expire_in: 1 week
  needs:
    - validate-aci-redesign-ndo
  rules: *aci-redesign-ndo-rules

apply-aci-redesign-ndo:
  extends: .tf-job
  stage: deploy
  resource_group: aci-redesign-ndo
  variables:
    <<: *aci-redesign-ndo-vars
  script:
    - cd aci-redesign/ndo
    - terraform init -input=false
    - terraform apply -input=false -auto-approve plan.tfplan
    - echo
    - echo '============================================================'
    - echo 'NDO schema AEDCE-IPv4 / Tenant_EUR_IPv4 has been UPDATED in NDO.'
    - echo 'The template is NOT YET DEPLOYED to APIC (deploy_templates=false).'
    - echo
    - echo 'Manual NDO UI step required:'
    - echo '  Application Management -> Schemas -> AEDCE-IPv4 ->'
    - echo '  Tenant_EUR_IPv4 -> Deploy to sites -> [AEDCG, AEDCK]'
    - echo '============================================================'
  dependencies:
    - plan-aci-redesign-ndo
  needs:
    - plan-aci-redesign-ndo
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - aci-redesign/ndo/**/*
        - aci-redesign/data/nac-ndo/**/*
    - if: $PROJECT == "aci-redesign-ndo"
