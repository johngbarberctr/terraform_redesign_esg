ndo:
  schemas:
    - name: Demo-Schema
      templates:
        - name: Demo-Template
          tenant: demo
          
          # Define the contract for online-boutique
          filters:
            - name: permit-src-any-dst-any
              display_name: Permit Any
              entries:
                - name: permit-src-any-dst-any
                  display_name: Permit Any Entry
                  ether_type: unspecified
                  
          contracts:
            - name: permit-to-online-boutique-all-services
              display_name: Permit to Online Boutique Services
              scope: global
              filter_relationships:
                - filter:
                    name: permit-src-any-dst-any
                    schema: Demo-Schema
                    template: Demo-Template
                  action: permit

          application_profiles:
            - name: online-boutique
              display_name: Online Boutique Application

          # ESG for online-boutique with IP-based selectors
          esgs:
            - name: all-services
              display_name: All Online Boutique Services
              vrf:
                name: vrf-01
                schema: Demo-Schema
                template: Demo-Template
              intra_esg_isolation: false
              preferred_group: false
              ip_subnet_selectors:
                - ip: 192.168.150.100/32
                - ip: 192.168.151.100/32
                - ip: 192.168.151.101/32
                - ip: 192.168.152.100/32
                - ip: 192.168.153.155/32
                - ip: 192.168.155.155/32
                - ip: 192.168.156.155/32

          # ESG contract relationships
          esg_contracts:
            - esg:
                name: all-services
                schema: Demo-Schema
                template: Demo-Template
              providers:
                - contract:
                    name: permit-to-online-boutique-all-services
                    schema: Demo-Schema
                    template: Demo-Template

          # VRF contract relationships
          vrf_contracts:
            - vrf:
                name: vrf-01
                schema: Demo-Schema
                template: Demo-Template
              consumers:
                - contract:
                    name: permit-to-online-boutique-all-services
                    schema: Demo-Schema
                    template: Demo-Template