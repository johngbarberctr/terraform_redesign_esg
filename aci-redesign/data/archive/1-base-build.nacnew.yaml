ndo:
  
  sites:
    - name: AEDCG
      id: 1
    - name: AEDCK
      id: 2

  schemas:
    - name: AEDCE
      templates:
        - name: VRF_Template
          tenant: EUR
        
        - name: G-Specific_Only
          tenant: EUR
        
        - name: K-Specific_Only
          tenant: EUR
        
        - name: L2_Non-Stretched
          tenant: EUR
        
        - name: L2_Stretched
          tenant: EUR
          
          bridge_domains:
            # Infrastructure Management Services
            - name: BD-INFRA-MGMT
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:10:15::1/64  # NAC
                  scope: public
                  shared: true
                - ip: fd00:10:10:69::1/64  # CFG-MGMT
                  scope: public
                  shared: true
                - ip: fd00:10:10:ef::1/64  # GEF-MGMT/RCC-GEF
                  scope: public
                  shared: true
                - ip: fd00:10:10:ec::1/64  # MECM (VLAN 3268)
                  scope: public
                  shared: true
            
            # Network Services
            - name: BD-NET-SERVICES
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:20:1b::1/64  # LB
                  scope: public
                  shared: true
                - ip: fd00:10:20:53::1/64  # DNS-MGMT
                  scope: public
                  shared: true
                - ip: fd00:10:20:bd::1/64  # RCC-DNS
                  scope: public
                  shared: true
                - ip: fd00:10:20:d2::1/64  # DHCP-SVR (VLAN 2262)
                  scope: public
                  shared: true
                - ip: fd00:10:20:d5::1/64  # SMTP-SVR
                  scope: public
                  shared: true
            
            # Voice and Communications
            - name: BD-VOICE-COMM
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:30:41::1/64  # VVOIP-MGMT
                  scope: public
                  shared: true
                - ip: fd00:10:30:42::1/64  # VVOIP-PROXY
                  scope: public
                  shared: true
                - ip: fd00:10:30:cb::1/64  # LMR
                  scope: public
                  shared: true
                - ip: fd00:10:30:e9::1/64  # E911-SVR
                  scope: public
                  shared: true
            
            # Security Services
            - name: BD-SECURITY
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:40:c0::1/64  # ACAS-SCANNERS (VLAN 3267)
                  scope: public
                  shared: true
                - ip: fd00:10:40:c1::1/64  # C2C-Scanners
                  scope: public
                  shared: true
                - ip: fd00:10:40:c5::1/64  # OCSP (VLAN 3260)
                  scope: public
                  shared: true
                - ip: fd00:10:40:ca::1/64  # PKI-SRV
                  scope: public
                  shared: true
            
            # Directory and Authentication
            - name: BD-DIRECTORY-AUTH
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:50:ad::1/64  # AD (VLAN 2260)
                  scope: public
                  shared: true
                - ip: fd00:10:50:af::1/64  # ADFS
                  scope: public
                  shared: true
            
            # Proxy Services
            - name: BD-PROXY
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:60:d6::1/64  # D64-PROXY
                  scope: public
                  shared: true
                - ip: fd00:10:60:d7::1/64  # RWEB-PROXY (Public)
                  scope: public
                  shared: true
                - ip: fd00:10:60:d8::1/64  # FWEB-PROXY (Public)
                  scope: public
                  shared: true
            
            # Application and Web Servers
            - name: BD-APP-WEB
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:70:e0::1/64  # APP-SVR (VLAN 2266)
                  scope: public
                  shared: true
                - ip: fd00:10:70:e4::1/64  # WEB-SVR (VLAN 3270, Public)
                  scope: public
                  shared: true
                - ip: fd00:10:70:e3::1/64  # FMWR-SVR
                  scope: public
                  shared: true
            
            # RCC Services
            - name: BD-RCC-SERVICES
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:80:bc::1/64  # RCC-SVR
                  scope: public
                  shared: true
                - ip: fd00:10:80:be::1/64  # RCC-DCO
                  scope: public
                  shared: true
                - ip: fd00:10:80:bf::1/64  # RCC-UNIX
                  scope: public
                  shared: true
            
            # Storage and File Services
            - name: BD-STORAGE
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:90:d0::1/64  # PRINT-SVR (VLAN 3262)
                  scope: public
                  shared: true
                - ip: fd00:10:90:d1::1/64  # FILE-SVR (VLAN 3264)
                  scope: public
                  shared: true
                - ip: fd00:10:90:dd::1/64  # BACKUP-SVR (VLAN 2265)
                  scope: public
                  shared: true
            
            # Database and Logging
            - name: BD-DATA-LOGGING
              l2_unknown_unicast: proxy
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template
              subnets:
                - ip: fd00:10:a0:db::1/64  # DB-SVR (VLAN 3265)
                  scope: public
                  shared: true
                - ip: fd00:10:a0:d9::1/64  # SYSLOG (VLAN 2264)
                  scope: public
                  shared: true
          
