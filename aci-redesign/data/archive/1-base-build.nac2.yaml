ndo:
  schemas:
    - name: AEDCE  # Or use a new name like EUR-MIGRATION if you prefer
      templates:
        # Template for VRFs, filters, and contracts
        - name: VRF_Template  # Now we can use any name we want!
          tenant: EUR
          
          # Create VRFs fresh
          vrfs:
            - name: EUR-E
              display_name: EUR-E VRF (86 BDs consolidated)
              
            - name: EUR-AIS
              display_name: EUR-AIS VRF (82 BDs consolidated)
              
            - name: EUR-AIM
              display_name: EUR-AIM VRF (10 BDs consolidated)
              
            - name: EUR-AIV
              display_name: EUR-AIV VRF (9 BDs consolidated)
              
            - name: EUR-AIZ
              display_name: EUR-AIZ VRF (8 BDs consolidated)
              
            - name: EUR-AIP
              display_name: EUR-AIP VRF (3 BDs consolidated)
              
            - name: EUR-AOV-UC-DMZ
              display_name: EUR-AOV-UC-DMZ VRF (1 BD)

          filters:
            - name: icmp
              display_name: ICMP Filter
              entries:
                - name: icmp
                  display_name: ICMP Entry
                  ip_protocol: icmp
                  
            - name: permit-src-any-dst-any
              display_name: Permit Any
              entries:
                - name: permit-src-any-dst-any
                  display_name: Permit Any Entry
                  ether_type: unspecified

          contracts:
            - name: intra-vrf
              display_name: Intra VRF Contract
              scope: global
              filter_relationships:
                - filter:
                    name: permit-src-any-dst-any
                  action: permit
                  
            - name: intra-esg
              display_name: Intra ESG Contract
              scope: global
              filter_relationships:
                - filter:
                    name: permit-src-any-dst-any
                  action: permit
                  
            - name: permit-to-vzAny
              display_name: Permit to vzAny
              scope: global
              filter_relationships:
                - filter:
                    name: permit-src-any-dst-any
                  action: permit
                  
            - name: permit-from-vzAny
              display_name: Permit from vzAny
              scope: global
              filter_relationships:
                - filter:
                    name: permit-src-any-dst-any
                  action: permit

        # Template for L2 resources
        - name: L2_Stretched
          tenant: EUR
          
          bridge_domains:
            - name: BD-EUR-E
              display_name: Consolidated BD for EUR-E VRF
              layer2_stretch: true
              vrf:
                name: EUR-E
                schema: AEDCE
                template: VRF_Template  # Now references our clean template
                  
            - name: BD-EUR-AIS
              display_name: Consolidated BD for EUR-AIS VRF
              layer2_stretch: true
              vrf:
                name: EUR-AIS
                schema: AEDCE
                template: VRF_Template
                  
            - name: BD-EUR-AIM
              display_name: Consolidated BD for EUR-AIM VRF
              layer2_stretch: true
              vrf:
                name: EUR-AIM
                schema: AEDCE
                template: VRF_Template
                  
            - name: BD-EUR-AIV
              display_name: Consolidated BD for EUR-AIV VRF
              layer2_stretch: true
              vrf:
                name: EUR-AIV
                schema: AEDCE
                template: VRF_Template
                  
            - name: BD-EUR-AIZ
              display_name: Consolidated BD for EUR-AIZ VRF
              layer2_stretch: true
              vrf:
                name: EUR-AIZ
                schema: AEDCE
                template: VRF_Template
                  
            - name: BD-EUR-AIP
              display_name: Consolidated BD for EUR-AIP VRF
              layer2_stretch: true
              vrf:
                name: EUR-AIP
                schema: AEDCE
                template: VRF_Template
                  
            - name: BD-EUR-AOV-UC-DMZ
              display_name: BD for EUR-AOV-UC-DMZ VRF
              layer2_stretch: true
              vrf:
                name: EUR-AOV-UC-DMZ
                schema: AEDCE
                template: VRF_Template

          application_profiles:
            - name: AppProf-NetCentric
              display_name: Network-centric EPGs
              
          epgs:
            - name: EPG-EUR-E
              display_name: EPG for EUR-E VRF
              bridge_domain:
                name: BD-EUR-E
              application_profile:
                name: AppProf-NetCentric
                  
            - name: EPG-EUR-AIS
              display_name: EPG for EUR-AIS VRF
              bridge_domain:
                name: BD-EUR-AIS
              application_profile:
                name: AppProf-NetCentric
                  
            - name: EPG-EUR-AIM
              display_name: EPG for EUR-AIM VRF
              bridge_domain:
                name: BD-EUR-AIM
              application_profile:
                name: AppProf-NetCentric
                  
            - name: EPG-EUR-AIV
              display_name: EPG for EUR-AIV VRF
              bridge_domain:
                name: BD-EUR-AIV
              application_profile:
                name: AppProf-NetCentric
                  
            - name: EPG-EUR-AIZ
              display_name: EPG for EUR-AIZ VRF
              bridge_domain:
                name: BD-EUR-AIZ
              application_profile:
                name: AppProf-NetCentric
                  
            - name: EPG-EUR-AIP
              display_name: EPG for EUR-AIP VRF
              bridge_domain:
                name: BD-EUR-AIP
              application_profile:
                name: AppProf-NetCentric
                  
            - name: EPG-EUR-AOV-UC-DMZ
              display_name: EPG for EUR-AOV-UC-DMZ VRF
              bridge_domain:
                name: BD-EUR-AOV-UC-DMZ
              application_profile:
                name: AppProf-NetCentric