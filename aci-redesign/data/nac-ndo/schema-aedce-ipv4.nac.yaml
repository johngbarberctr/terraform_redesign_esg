# =============================================================================
# Schema AEDCE-IPv4 -- single source of truth for the IPv4 tenant tree.
#
# Single-template design (Cisco NDO "Approach 1: Single Template Deployment"
# from the 4.3.1 templates overview). Everything for the IPv4 redesign lives
# in one template:
#
#   - 2 VRFs (VRF-EUR, VRF-DMZ) with vzAny enforced
#   - 2 contracts (Any_VRF-EUR, Any_VRF-DMZ), filter cross-ref to
#     AEDCE/VRF_Template/Any (filter names are unique per tenant)
#   - 39 stretched BDs (l2_stretch=true is the default in nac-ndo)
#   - 2 ANPs (AppProf-AppCentric, AppProf-DMZ) with 39 EPGs total
#   - VMware VMM bindings on every EPG to APCG-VDS1 on AEDCG and APCK-VDS1
#     on AEDCK (per-fabric VMM domains: each adopts its own pre-existing VDS
#     in the shared vCenter rather than creating a new shared VDS)
#
# Why single template:
#   * Fully-stretched, fully-symmetric tenant -- no site-local objects.
#   * No cross-template references => no risk of NDO 4.0+ cyclical dep error.
#   * One deploy click in the NDO UI per change.
#   * One rollback unit per coherent change set.
#   * Aligns with the existing AEDCE/VRF_Template single-template pattern.
#
# Deploy / cutover:
#   * The ndo/ Terraform root runs with deploy_templates=false. This file
#     creates the schema and template content in NDO only. Pushes to AEDCG
#     and AEDCK are operator-driven from the NDO UI:
#       Application Management -> Schemas -> AEDCE-IPv4
#         -> Tenant_EUR_IPv4 -> Deploy to sites
#   * Static port bindings on the EPGs are NOT in this file. They land via
#     ../../scripts/deploy_bindings.py against the NDO REST API after the
#     template is deployed.
#
# Notes:
#   * Filter "Any" intentionally NOT defined here. Tenant EUR already has
#     filter Any in schema AEDCE / template VRF_Template (created by the
#     ndo-terraform-nac-prod stack). NDO enforces unique object names per
#     tenant, so the two contracts below cross-reference that existing filter.
#   * L3Outs and External EPGs are NOT declared in this schema. North-south
#     routing for VRF-EUR and VRF-DMZ is provided by the L3Outs that already
#     exist in the legacy IPv6 schema (managed by ../../ndo-terraform/). Both
#     redesigns share the same VRF objects on the APICs (same names, same
#     tenant), so the existing L3Outs already attach to the redesign VRFs
#     once NDO deploys them. If/when the IPv4 redesign needs its own L3Outs
#     (different EPG-to-L3Out scoping, separate routing policy, etc.) add
#     `l3outs:` and `external_epgs:` blocks here -- but for the first
#     cutover the legacy L3Outs are explicitly kept as the SoT.
#   * ESGs are NOT declared. The netascode/nac-ndo/mso v1.2.x module schema
#     does not yet model endpoint_security_groups. The legacy ESGs were
#     vacuous (single ESG containing every EPG in a VRF) so vzAny+permit-all
#     covers the same intent.
#   * Static port bindings (staticPorts[] on EPGs) are NOT in this YAML.
#     nac-ndo doesn't model that field yet. They are PATCHed into NDO via
#     ../../scripts/deploy_bindings.py from a curated JSON file AFTER this
#     schema is deployed. Three EPGs (EPG-LB, EPG-LMR, EPG-VHOST-MGMT) are
#     deliberately NOT bound to a VMM domain because their endpoints are
#     physical (F5 BIG-IP, LMR gateways, ESXi vmkernel); they require
#     static bindings to function.
#   * sites: at the template level associates the template to AEDCG/AEDCK.
#     sites: under each VRF is for site-local VRF properties; with no
#     site-local overrides, listing the sites is harmless and matches the
#     style of the existing IPv6 schema.
# =============================================================================
---
ndo:
  schemas:
    - name: AEDCE-IPv4
      templates:
        - name: Tenant_EUR_IPv4
          tenant: EUR
          sites:
            - AEDCG
            - AEDCK

          # ─────────────────────────────────────────────────────────────────────
          # VRFs and contracts (vzAny permit-all between EPGs in the VRF)
          # ─────────────────────────────────────────────────────────────────────
          vrfs:
            - name: VRF-EUR
              vzany: true
              contracts:
                providers:
                  - name: Any_VRF-EUR
                consumers:
                  - name: Any_VRF-EUR
              sites:
                - name: AEDCG
                - name: AEDCK

            - name: VRF-DMZ
              vzany: true
              contracts:
                providers:
                  - name: Any_VRF-DMZ
                consumers:
                  - name: Any_VRF-DMZ
              sites:
                - name: AEDCG
                - name: AEDCK

          contracts:
            - name: Any_VRF-EUR
              scope: context
              type: bothWay
              filters:
                - name: Any
                  schema: AEDCE
                  template: VRF_Template

            - name: Any_VRF-DMZ
              scope: context
              type: bothWay
              filters:
                - name: Any
                  schema: AEDCE
                  template: VRF_Template

          # ─────────────────────────────────────────────────────────────────────
          # Bridge Domains (39 total: 36 in VRF-EUR, 3 in VRF-DMZ)
          # All BDs are L2-stretched (default behaviour in nac-ndo).
