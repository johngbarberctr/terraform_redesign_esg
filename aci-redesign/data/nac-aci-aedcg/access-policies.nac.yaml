# Access policies for VMM host connectivity.
# VLAN pool, interface policies, AAEP, VPC policy group, and leaf profiles.
# VMM domain itself is defined in vmm-domain.nac.yaml under fabric_policies.
---
apic:
  access_policies:
    vlan_pools:
      - name: vmm-vlan-pool
        allocation: dynamic
        ranges:
          - from: 3501
            to: 3967

    physical_domains:
      - name: phys-vmm-domain
        vlan_pool: vmm-vlan-pool

    # netascode/nac-aci 0.7.0 reads CDP/LLDP/Port-Channel/Link-Level policies
    # from access_policies.interface_policies.* (see
    # .terraform/modules/aci_aedcg/aci_access_policies.tf:224/233/243/254).
    # The module has no lacp_policies key -- lacpLagPol is created from
    # port_channel_policies, and PGs reference it via port_channel_policy:.
    interface_policies:
      cdp_policies:
        - name: cdp-enabled
          admin_state: true

      lldp_policies:
        - name: lldp-enabled
          admin_rx_state: true
          admin_tx_state: true

      port_channel_policies:
        - name: mac-pinning
          mode: mac-pin

      link_level_policies:
        - name: 10G
          speed: "10G"
          auto: true

    aaeps:
      - name: vmm-aaep
        infra_vlan: true
        vmware_vmm_domains:
          # APCG-VDS1 is the existing VDS in the shared lab vCenter; the
          # VMM domain on this APIC is named identically so APIC adopts it
          # in read-write mode rather than creating a new VDS.
          - APCG-VDS1
        physical_domains:
          - phys-vmm-domain

    leaf_interface_policy_groups:
      - name: vpc-vmm-hosts
        type: vpc
        aaep: vmm-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: mac-pinning

    # Leaf nodes 152 and 153 in AEDCG. If/when the lab gets recabled or the
    # production AEDCG IDs differ, update both the profile name suffix and the
    # node_blocks `from`/`to` below. The names are referenced nowhere else in
    # this repo, so renaming them is a single-file change.
    leaf_interface_profiles:
      - name: leaf-152-153-intprof
        interface_selectors:
          - name: vmm-host-ports
            policy_group: vpc-vmm-hosts
            port_blocks:
              - name: block1
                from_port: 1
                to_port: 48

    leaf_switch_profiles:
      - name: leaf-152-153-prof
        selectors:
          - name: leaf-152-153-sel
            node_blocks:
              - name: block1
                from: 152
                to: 153
        interface_profiles:
          - leaf-152-153-intprof
