# Access policies for VMM host connectivity.
# VLAN pool, interface policies, AAEP, VPC policy group, and leaf profiles.
# VMM domain itself is defined in vmm-domain.nac.yaml under fabric_policies.
---
apic:
  access_policies:
    vlan_pools:
      - name: vmm-vlan-pool
        allocation: dynamic
        ranges:
          - from: 3501
            to: 3967

    physical_domains:
      - name: phys-vmm-domain
        vlan_pool: vmm-vlan-pool

    cdp_policies:
      - name: cdp-enabled
        admin_state: true

    lldp_policies:
      - name: lldp-enabled
        receive_state: true
        transmit_state: true

    lacp_policies:
      - name: lacp-active
        mode: active

    port_channel_policies:
      - name: mac-pinning
        mode: mac-pinning

    link_level_policies:
      - name: 10G
        speed: "10G"
        auto: true

    aaeps:
      - name: vmm-aaep
        infra_vlan: true
        vmware_vmm_domains:
          - vmm-vcenter-rcc
        physical_domains:
          - phys-vmm-domain

    leaf_interface_policy_groups:
      - name: vpc-vmm-hosts
        type: vpc
        aaep: vmm-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        lacp_policy: lacp-active
        port_channel_policy: mac-pinning

    leaf_interface_profiles:
      - name: leaf-111-112-intprof
        interface_selectors:
          - name: vmm-host-ports
            policy_group: vpc-vmm-hosts
            port_blocks:
              - name: block1
                from_port: 1
                to_port: 48

    leaf_switch_profiles:
      - name: leaf-111-112-prof
        selectors:
          - name: leaf-111-112-sel
            node_blocks:
              - name: block1
                from: 111
                to: 112
        interface_profiles:
          - leaf-111-112-intprof
