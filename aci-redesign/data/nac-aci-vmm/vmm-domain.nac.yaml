# VMware VMM Domain -- creates the vCenter domain and Virtual Distributed Switch.
# ACI manages the VDS lifecycle when dvs_version is set to a real version.
# Update placeholder values (vCenter IP, datacenter, credentials, dvs_version) before apply.
---
apic:
  fabric_policies:
    vmware_vmm_domains:
      - name: vmm-vcenter-rcc
        access_mode: read-write
        tag_collection: true
        vlan_pool: vmm-vlan-pool
        vswitch:
          cdp_policy: cdp-enabled
          lldp_policy: lldp-enabled
          port_channel_policy: mac-pinning
        credential_policies:
          - name: vcenter-creds
            username: "administrator"
            password: "C1sco12345!"
        vcenters:
          - name: vcenter01
            hostname_ip: "198.18.134.80"
            datacenter: "Datacenter"
            credential_policy: vcenter-creds
            dvs_version: "6.6"
        uplinks:
          - id: 1
            name: uplink1
          - id: 2
            name: uplink2
