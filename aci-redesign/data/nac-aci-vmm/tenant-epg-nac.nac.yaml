# EUR tenant -- VRF, Bridge Domain, and EPG attached to VMware VMM domain.
# BD-NAC provides the Layer 2/3 domain for NAC endpoints on the VMM domain.
# VMM uses dynamic VLAN assignment from vmm-vlan-pool (3501-3967).
---
apic:
  tenants:
    - name: EUR
      vrfs:
        - name: VRF-NAC

      bridge_domains:
        - name: BD-NAC
          vrf: VRF-NAC
          subnets:
            - ip: 10.0.0.1/24
              public: true
              shared: false

      application_profiles:
        - name: AppProf-RCC
          description: RCC IPv6 application profile
          endpoint_groups:
            - name: EPG-NAC
              bridge_domain: BD-NAC
              vmware_vmm_domains:
                - name: vmm-vcenter-rcc
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
