# Notes:
# - NAC-ACI APIC config to attach an EPG to the VMware VMM domain.
# - This assumes the VMM domain already exists on APIC.
# - Dynamic VLAN assignment from vmm-vlan-pool (3501-3967). No VLAN specified per EPG.
#
---
apic:
  tenants:
    - name: EUR
      application_profiles:
        - name: AppProf-RCC
          description: RCC IPv6 application profile
          endpoint_groups:
            - name: EPG-NAC
              bridge_domain: BD-NAC
              vmware_vmm_domains:
                - name: vmm-vcenter-rcc
                  deployment_immediacy: immediate
                  resolution_immediacy: immediate
