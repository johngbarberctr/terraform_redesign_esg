# terraform-esg root pipeline orchestrator
#
# This file is intentionally thin. The four in-repo Terraform projects
# each own their own pipeline definition (validate / plan / apply manual)
# in a per-project `.gitlab-ci.yml`. This orchestrator:
#
#   1. Defines stages once.
#   2. Defines a `.tf-job` template that all per-project jobs extend
#      (image, before_script, default cache).
#   3. Includes each per-project file via `include: local:`.
#   4. Owns the cross-project FI-binding parity check (it spans the NDO
#      schema YAML and the scripts/ tools).
#
# Per-project files:
#   aci-redesign/apic-vmware/.gitlab-ci.yml         lab APIC root
#   aci-redesign/apic-vmware-prod/.gitlab-ci.yml    prod APIC root
#   aci-redesign/ndo/.gitlab-ci.yml                 IPv4 redesign tenant tree (NDO)
#   ndo-terraform-ipv6/.gitlab-ci.yml               IPv6 RCC layer (NDO)
#
# Sibling foundational stack (Phase 1 in the canonical runbook) lives in
# its OWN repo and has its OWN root .gitlab-ci.yml:
#   ~/DC/ACI/ndo-terraform-nac-prod/.gitlab-ci.yml
#
# Pipeline triggering:
#   - Push / MR with file changes: only the affected project's jobs run
#     (each per-project file uses `rules: changes:` to scope itself).
#   - Manual via GitLab UI -> Run pipeline:
#       * leave PROJECT empty -> standard rules apply (changes-driven only)
#       * set PROJECT=<name>  -> only that project's jobs queue up
#         Recognized values:
#           apic-vmware
#           apic-vmware-prod
#           aci-redesign-ndo
#           ndo-terraform-ipv6
#   - apply jobs are ALWAYS `when: manual`; no project ever auto-applies.
#
# Runner support:
#   - Lab GitLab runs on a Docker executor; uses `image: danischm/nac:0.2.0`.
#   - Prod GitLab runs on a shell executor; ignores `image:` and relies on
#     `before_script: export PATH=...` plus terraform/jq installed on the
#     runner host.
#   - The same .gitlab-ci.yml file works for both; only the per-environment
#     CI/CD variables (URLs, creds, *_PROD vs unsuffixed) differ.

stages:
  - validate
  - plan
  - deploy

variables:
  GIT_SSL_NO_VERIFY: "true"
  GITLAB_API_URL:
    description: "GitLab API v4 root URL"
    value: "${CI_API_V4_URL}"

  # The following are documented in each per-project file. They are
  # listed once here so the GitLab UI's 'Variables' settings page shows
  # the operator a hint of what's required, even before any included
  # file has rendered.
  PROJECT:
    description: "Manually trigger one project's jobs only. One of: apic-vmware | apic-vmware-prod | aci-redesign-ndo | ndo-terraform-ipv6. Leave empty for changes-driven runs."
    value: ""
  NDO_USERNAME:
    description: "NDO username (used by aci-redesign/ndo and ndo-terraform-ipv6)"
  NDO_PASSWORD:
    description: "NDO password (Masked)"
  NDO_URL:
    description: "NDO URL"
  AEDCG_APIC_URL:
    description: "Lab AEDCG APIC URL (apic-vmware)"
  AEDCG_APIC_USERNAME:
    description: "Lab AEDCG APIC username"
  AEDCG_APIC_PASSWORD:
    description: "Lab AEDCG APIC password (Masked + Protected)"
  AEDCG_MCP_KEY:
    description: "Lab AEDCG MCP Instance Policy key (>=8 chars, mixed; Masked + Protected)"
  AEDCK_APIC_URL:
    description: "Lab AEDCK APIC URL"
  AEDCK_APIC_USERNAME:
    description: "Lab AEDCK APIC username"
  AEDCK_APIC_PASSWORD:
    description: "Lab AEDCK APIC password (Masked + Protected)"
  AEDCK_MCP_KEY:
    description: "Lab AEDCK MCP Instance Policy key (Masked + Protected)"
  AEDCG_APIC_URL_PROD:
    description: "Prod AEDCG APIC URL (apic-vmware-prod)"
  AEDCG_APIC_USERNAME_PROD:
    description: "Prod AEDCG APIC username"
  AEDCG_APIC_PASSWORD_PROD:
    description: "Prod AEDCG APIC password (Masked + Protected)"
  AEDCG_MCP_KEY_PROD:
    description: "Prod AEDCG MCP Instance Policy key (Masked + Protected)"
  AEDCK_APIC_URL_PROD:
    description: "Prod AEDCK APIC URL"
  AEDCK_APIC_USERNAME_PROD:
    description: "Prod AEDCK APIC username"
  AEDCK_APIC_PASSWORD_PROD:
    description: "Prod AEDCK APIC password (Masked + Protected)"
  AEDCK_MCP_KEY_PROD:
    description: "Prod AEDCK MCP Instance Policy key (Masked + Protected)"
  VCENTER_HOSTNAME_IP:
    description: "vCenter IP/FQDN (shared by both APIC roots; if your prod vCenter is a different instance, add VCENTER_HOSTNAME_IP_PROD and update apic-vmware-prod/.gitlab-ci.yml)"
  VCENTER_DATACENTER:
    description: "vCenter datacenter name"
  VCENTER_DVS_VERSION:
    description: "vSphere VDS version. Use 'unmanaged' for vCenter 7.x/8.x; concrete values allowed by netascode/nac-aci validator: 5.1, 5.5, 6.0, 6.5, 6.6"
    value: "unmanaged"
  VCENTER_USERNAME:
    description: "vCenter service-account username (Masked + Protected)"
  VCENTER_PASSWORD:
    description: "vCenter service-account password (Masked + Protected)"
  # NOTE: TF_HTTP_USERNAME / TF_HTTP_PASSWORD are NOT required as project
  # variables. Each per-project file pins them inside its *-vars anchor to
  # `gitlab-ci-token` / ${CI_JOB_TOKEN} so the HTTP state backend
  # authenticates with the per-job CI token. No PAT to manage, no expiry.
  GITLAB_TOKEN:
    description: "User access token for MR comments (Masked)"

# Shared template extended by every per-project job.
.tf-job:
  image: danischm/nac:0.2.0
  before_script:
    - export PATH="/usr/bin:$PATH"

# Per-project includes are gated on the file existing so per-project
# pipelines can be enabled / disabled independently by adding or removing
# the per-project .gitlab-ci.yml from the repo. This keeps the umbrella
# stable while individual projects come online (e.g. apic-vmware-prod
# only goes live once *_PROD CI variables are populated).
include:
  - local: aci-redesign/apic-vmware/.gitlab-ci.yml
    rules:
      - exists: [aci-redesign/apic-vmware/.gitlab-ci.yml]
  - local: aci-redesign/apic-vmware-prod/.gitlab-ci.yml
    rules:
      - exists: [aci-redesign/apic-vmware-prod/.gitlab-ci.yml]
  - local: aci-redesign/ndo/.gitlab-ci.yml
    rules:
      - exists: [aci-redesign/ndo/.gitlab-ci.yml]
  - local: ndo-terraform-ipv6/.gitlab-ci.yml
    rules:
      - exists: [ndo-terraform-ipv6/.gitlab-ci.yml]

# ============================================
# Cross-project: FI-binding parity check
#
# The IPv4 redesign deploys two coupled artifacts: the tenant tree (via
# Terraform from data/nac-ndo/schema-aedce-ipv4.nac.yaml) and the FI-uplink
# static-port bindings on PC_FI_A / PC_FI_B (PATCHed via deploy_bindings.py).
# If they drift -- e.g. an EPG added to the schema without a corresponding
# regeneration of fi_epg_manifest.json -- VMs behind the UCS FI on that EPG
# silently lose L2. This job fails the merge if drift is detected.
# Pure-Python stdlib (no module install) so it runs identically on Docker
# (lab) and shell (prod) runners.
# ============================================
parity-check-fi-bindings:
  extends: .tf-job
  stage: validate
  script:
    - cd aci-redesign/scripts
    - python3 check_fi_bindings_parity.py
  cache: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - aci-redesign/data/nac-ndo/schema-aedce-ipv4.nac.yaml
        - aci-redesign/scripts/generate_fi_bindings.py
        - aci-redesign/scripts/check_fi_bindings_parity.py
        - aci-redesign/scripts/fi_epg_manifest.json
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - aci-redesign/data/nac-ndo/schema-aedce-ipv4.nac.yaml
        - aci-redesign/scripts/generate_fi_bindings.py
        - aci-redesign/scripts/check_fi_bindings_parity.py
        - aci-redesign/scripts/fi_epg_manifest.json
    - if: $PROJECT == "aci-redesign-ndo"
