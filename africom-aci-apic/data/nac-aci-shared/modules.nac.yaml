# Selectively disable sub-modules inside the netascode/nac-aci/aci wrapper.
# Keys under `modules:` map to the sub-module names in the wrapper's
# aci_access_policies.tf / aci_fabric_policies.tf (e.g. `aci_mcp`).
#
# aci_mcp = false:
#   The wrapper's MCP Instance Policy sub-module is disabled here so we can
#   manage `uni/infra/mcpInstP-default` directly in apic-vmware/main.tf and
#   inject the MCP key from outside the repo (TF_VAR_mcp_key / CI masked
#   variable / Vault), rather than relying on the wrapper's default key.
---
modules:
  aci_mcp: false
