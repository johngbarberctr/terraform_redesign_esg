          - { from: 2170, to: 2176 }
          - { from: 2205, to: 2205 }
          - { from: 2250, to: 2250 }

    physical_domains:
      - name: phys-fi-domain
        vlan_pool: fi-static-vlan-pool

    routed_domains:
      - name: L3_Dom_ND
        vlan_pool: fi-static-vlan-pool

    interface_policies:
      cdp_policies:
        - name: cdp-enabled
          admin_state: true

      lldp_policies:
        - name: lldp-enabled
          admin_rx_state: true
          admin_tx_state: true

      port_channel_policies:
        - name: mac-pinning
          mode: mac-pin

        - name: lacp-active
          mode: active

      link_level_policies:
        - name: 10G
          speed: "10G"
          auto: true

    aaeps:
      # AAEP for the UCS FI vPC uplinks. Carries the VMware VMM domain
      # (Kelley-VDS1, VDS trunk to the ESXi hosts behind the FIs) AND the
      # static physical domain (the EPG VLANs trunked as static paths).
      # infra_vlan is true so ESXi VTEPs get the infra VLAN for OpFlex.
      - name: fi-aaep
        infra_vlan: true
        vmware_vmm_domains:
          - Kelley-VDS1
        physical_domains:
          - phys-fi-domain

      - name: AAEP_ACI_Nexus
        routed_domains:
          - L3_Dom_ND

    leaf_interface_policy_groups:
      # Real vPCs to the UCS Fabric Interconnects (dual-homed across 101/102).
      - name: VPC_FI-A
        type: vpc
        aaep: fi-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: lacp-active

      - name: VPC_FI-B
        type: vpc
        aaep: fi-aaep
        link_level_policy: 10G
        cdp_policy: cdp-enabled
        lldp_policy: lldp-enabled
        port_channel_policy: lacp-active

    # One interface profile shared by both leaves of the 101/102 switch profile.
    # Because the policy groups are type: vpc, applying the same profile to both
    # leaves forms a vPC per FI. eth1/6 = FI-A, eth1/7 = FI-B.
    # TODO: confirm the actual leaf ports the FIs land on before deploying.
    leaf_interface_profiles:
      - name: leaf-101-102-intprof
        interface_selectors:
          - name: fi-a-uplink
            policy_group: VPC_FI-A
            port_blocks:
              - name: block1
                from_port: 6
                to_port: 6
          - name: fi-b-uplink
            policy_group: VPC_FI-B
            port_blocks:
              - name: block1
                from_port: 7
                to_port: 7

    leaf_switch_profiles:
      - name: leaf-101-102-prof
        selectors:
          - name: leaf-101-102-sel
            node_blocks:
              - name: block1
                from: 101
                to: 102
        interface_profiles:
          - leaf-101-102-intprof
