# Access policies for AFRICOM NIPR -- Kelley fabric, PRODUCTION.
#
# This directory is loaded by the production Terraform run (prod.tfvars).
# It is intentionally IDENTICAL in design to ../nac-aci-kelley/ (the lab/base
# copy): same VLAN pools, same VPC_FI-A/B vPC uplinks on eth1/6-7, same fi-aaep
# carrying the Kelley-VDS1 VMM domain + phys-fi-domain. The ONLY prod/lab
# differences are environment values (APIC / vCenter / NDO IP addresses and the
# device usernames/passwords), which live in prod.tfvars and CI masked
# variables -- never in this access-policies file. Keep this file in sync with
# ../nac-aci-kelley/access-policies.nac.yaml.
#
# Leaf nodes: NADE02LF101 (node 101), NADE02LF102 (node 102)
# Infra VLAN: 3967
#
# UCS Fabric Interconnect uplinks (real vPCs, dual-homed):
#   VPC_FI-A  -> vPC across Leaf-101 + Leaf-102, eth1/6  (to UCS FI-A)
#   VPC_FI-B  -> vPC across Leaf-101 + Leaf-102, eth1/7  (to UCS FI-B)
# Both vPCs land on the fi-aaep, which carries BOTH the VMware VMM domain
# (Kelley-VDS1, dynamic VLANs) and the physical domain (static EPG VLANs that
# the NDO schema trunks over the FI vPCs).
#
# The vPC explicit protection group for nodes 101/102 is NOT managed here
# (main.tf sets manage_node_policies = false). It already exists in the
# production fabric (the legacy N5K-migration vPCs use the same 101/102 pair).
#
# The VMM domain object (Kelley-VDS1) itself is defined under fabric_policies
# in the rendered data/nac-aci-kelley-rendered/vmm-domain.nac.yaml, produced by
# scripts/render-vmm-yaml.sh kelley from templates/vmm-domain.nac.yaml.tftpl.
---
apic:
  access_policies:
    vlan_pools:
      # Dynamic pool for the VMware VMM domain (Kelley-VDS1). VMM domains
      # require dynamic allocation. Range is separate from the static EPG
      # VLANs below. NOTE: Kelley infra VLAN is 3967 -- kept OUT of this pool
      # (capped at 3966). Confirm the intended dynamic range with the customer.
      - name: vmm-vlan-pool
        allocation: dynamic
        ranges:
          - { from: 3501, to: 3966 }

      # Static pool for the EPG VLANs trunked to ESXi over the FI vPCs. This is
      # the exact union of every `vlan:` used by ANP EPGs in the AFRICOM NDO
      # schema (data/ndo/schema_AFRICOM.nac.yaml): 205 VLANs in 92 ranges.
      - name: fi-static-vlan-pool
        allocation: static
        ranges:
          - { from: 5, to: 6 }
          - { from: 9, to: 10 }
          - { from: 14, to: 17 }
          - { from: 20, to: 22 }
          - { from: 33, to: 33 }
          - { from: 91, to: 92 }
          - { from: 99, to: 99 }
