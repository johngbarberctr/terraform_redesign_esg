# Access policies for AFRICOM NIPR -- Del Din fabric (NAIT03).
#
# Leaf nodes:   NAIT03LF101 (node 101), NAIT03LF102 (node 102)
# Border leafs: NAIT03BL103 (node 103), NAIT03BL104 (node 104)
# Infra VLAN: 450
#
# UCS Fabric Interconnect uplinks (real vPCs, dual-homed):
#   VPC_FI-A  -> vPC across Leaf-101 + Leaf-102, eth1/6  (to UCS FI-A)
#   VPC_FI-B  -> vPC across Leaf-101 + Leaf-102, eth1/7  (to UCS FI-B)
# Both vPCs land on the fi-aaep, which carries BOTH the VMware VMM domain
# (Del-Din-VDS1, dynamic VLANs) and the physical domain (static EPG VLANs that
# the NDO schema trunks over the FI vPCs).
#
# The vPC explicit protection group for nodes 101/102 is NOT managed here
# (main.tf sets manage_node_policies = false). It already exists in the
# production fabric (the legacy N5K-migration vPCs use the same 101/102 pair).
#
# The VMM domain object (Del-Din-VDS1) itself is defined under fabric_policies
# in the rendered data/nac-aci-deldin-rendered/vmm-domain.nac.yaml, produced by
# scripts/render-vmm-yaml.sh deldin from templates/vmm-domain.nac.yaml.tftpl.
#
# NOTE: Del Din has 4 leaf-role nodes (LF101/102 + BL103/104). The border leafs
# (BL103/104) are L3Out-attached and are NOT part of the FI vPCs. Their
# selectors are left as a TODO (managed out of band today).
#
# NOTE: Tenant objects (AFR-DEL.Services BDs, EPGs, ESGs) are managed by
# ../africom-aci-ndo/ and ../nac-aci-shared/tenant-afrdel-esgs.nac.yaml,
# not here.
---
apic:
  access_policies:
    vlan_pools:
      # Dynamic pool for the VMware VMM domain (Del-Din-VDS1). Del Din infra
      # VLAN is 450 (outside this range). Confirm the intended dynamic range
      # with the customer.
      - name: vmm-vlan-pool
        allocation: dynamic
        ranges:
          - { from: 3501, to: 3967 }

      # Static pool for the EPG VLANs trunked to ESXi over the FI vPCs. Exact
      # union of every `vlan:` used by ANP EPGs in the AFRICOM NDO schema
      # (data/ndo/schema_AFRICOM.nac.yaml): 205 VLANs in 92 ranges. Same union
      # is used at both sites (the schema binds both sites on the same VLANs).
      - name: fi-static-vlan-pool
        allocation: static
        ranges:
          - { from: 5, to: 6 }
          - { from: 9, to: 10 }
          - { from: 14, to: 17 }
          - { from: 20, to: 22 }
          - { from: 33, to: 33 }
          - { from: 91, to: 92 }
          - { from: 99, to: 99 }
          - { from: 106, to: 106 }
          - { from: 108, to: 108 }
          - { from: 110, to: 110 }
          - { from: 120, to: 120 }
          - { from: 122, to: 122 }
          - { from: 125, to: 125 }
          - { from: 140, to: 140 }
          - { from: 142, to: 142 }
          - { from: 144, to: 144 }
          - { from: 150, to: 150 }
          - { from: 160, to: 164 }
          - { from: 170, to: 174 }
          - { from: 176, to: 176 }
          - { from: 178, to: 179 }
          - { from: 191, to: 194 }
          - { from: 210, to: 210 }
